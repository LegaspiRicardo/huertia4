<div class="min-h-dvh bg-[#F4F8F2] flex flex-col justify-center px-8">

    <div class="mx-auto w-full max-w-sm">

        <div class="mb-10 text-center">

            <img
                src="/brote.gif"
                alt="HuertIA"
                class="mx-auto mb-4 h-24 w-24">

            <h1 class="text-4xl font-bold text-[#36523C]">
                Crear cuenta
            </h1>

            <p class="mt-3 text-gray-600">
                Empieza a registrar y cuidar tu jardín.
            </p>

        </div>

        <form class="space-y-5">

            <div>

                <label class="mb-2 block text-sm font-medium">
                    Nombre
                </label>

                <input
                    type="text"
                    placeholder="Tu nombre"
                    class="w-full rounded-xl border border-gray-300 bg-white p-4 outline-none focus:border-[#4F7D5C]">

            </div>

            <div>

                <label class="mb-2 block text-sm font-medium">
                    Correo electrónico
                </label>

                <input
                    type="email"
                    placeholder="correo@ejemplo.com"
                    class="w-full rounded-xl border border-gray-300 bg-white p-4 outline-none focus:border-[#4F7D5C]">

            </div>

            <div>

                <label class="mb-2 block text-sm font-medium">
                    Contraseña
                </label>

                <input
                    type="password"
                    placeholder="••••••••"
                    class="w-full rounded-xl border border-gray-300 bg-white p-4 outline-none focus:border-[#4F7D5C]">

            </div>

            <div>

                <label class="mb-2 block text-sm font-medium">
                    Confirmar contraseña
                </label>

                <input
                    type="password"
                    placeholder="••••••••"
                    class="w-full rounded-xl border border-gray-300 bg-white p-4 outline-none focus:border-[#4F7D5C]">

            </div>

            <button
                type="button"
                routerLink="/dashboard"
                class="mt-6 w-full rounded-xl bg-[#4F7D5C] p-4 font-semibold text-white transition hover:opacity-90">

                Continuar

            </button>

        </form>

        <div class="mt-8 text-center">

            <span class="text-gray-600">
                ¿Ya tienes una cuenta?
            </span>

            <a
                routerLink="/login"
                class="ml-1 font-semibold text-[#4F7D5C]">

                Inicia sesión

            </a>

        </div>

    </div>

</div>
